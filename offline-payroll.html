            <div class="control-row">
              ${reportType ? `
                <button class="btn" type="button" onclick="generateReport('${attr(reportType)}', '${attr(clientId)}')">Generate report</button>
                <button class="btn secondary" type="button" onclick="downloadGeneratedReportCsv('${attr(reportType)}', '${attr(clientId)}')">CSV</button>
                <button class="btn secondary" type="button" onclick="printGeneratedReport('${attr(reportType)}', '${attr(clientId)}')">Print</button>
              ` : `
                <button class="btn secondary" type="button" onclick="exportTaxSummaryCsv()">Tax CSV</button>
                <button class="btn secondary" type="button" onclick="exportWageReportCsv()">Wage CSV</button>
                <button class="btn secondary" type="button" onclick="printTaxReport()">Print</button>
              `}
            </div>
          </div>
        </section>
      `;
    }

    function reportRunsForContext(clientId = "") {
      return data.payRuns.filter(run => {
        const effectiveClient = clientId || (reportClientFilter === "All" ? "" : reportClientFilter);
        if (effectiveClient && run.clientId !== effectiveClient) return false;
        if (reportYearFilter && String(run.payDate || "").slice(0, 4) !== reportYearFilter) return false;
        if (reportQuarterFilter !== "All" && quarterFor(run.payDate) !== reportQuarterFilter) return false;
        return true;
      });
    }

    function serviceOrdersForReportContext(clientId = "") {
      const effectiveClient = clientId || currentReportClientId() || (reportClientFilter === "All" ? "" : reportClientFilter);
      return (data.serviceOrders || []).filter(order => {
        if (effectiveClient && order.clientId !== effectiveClient) return false;
        if (reportYearFilter && String(order.serviceDate || "").slice(0, 4) !== reportYearFilter) return false;
        if (reportQuarterFilter !== "All" && quarterFor(order.serviceDate) !== reportQuarterFilter) return false;
        return true;
      });
    }

    function reportMetrics(runs) {
      const summaryRows = taxSummaryRows(runs);
      const wageRows = wageReportRows(runs);
      const totals = summaryRows.reduce((acc, row) => {
        acc.gross += row.gross;
        acc.netPay += row.netPay;
        acc.federalLiability += row.federalLiability;
        acc.stateLiability += row.stateLiability;
        acc.employerTaxes += row.employerFica + row.employerMedicare + row.futa + row.suta;
        return acc;
      }, { gross: 0, netPay: 0, federalLiability: 0, stateLiability: 0, employerTaxes: 0 });
      return { summaryRows, wageRows, totals };
    }

    function reportGenerationKey(reportType, clientId = "") {
      const effectiveClient = clientId || (reportClientFilter === "All" ? "All" : reportClientFilter);
      return [reportType || "", effectiveClient, reportYearFilter, reportQuarterFilter].join("|");
    }

    function reportIsGenerated(reportType, clientId = "") {
      return generatedReportKey === reportGenerationKey(reportType, clientId);
    }

    function generateReport(reportType, clientId = "") {
      generatedReportKey = reportGenerationKey(reportType, clientId);
      render();
    }

    function rowsFromRunLines(runs, mapper) {
      const rows = [];
      runs.forEach(run => {
        const clientRecord = client(run.clientId);
        calculateRun(run).lines.forEach(({ line, employee: employeeRecord, totals }) => {
          if (!employeeRecord) return;
          rows.push(mapper({ run, clientRecord, employeeRecord, line, totals }));
        });
      });
      return rows;
    }

    function generatedReportData(reportType, runs) {
      const report = reportBySlug(reportType) || { label: "Report", slug: reportType || "" };
      const { summaryRows, wageRows, totals } = reportMetrics(runs);
      const baseSummaryRows = summaryRows.map(row => [
        row.client?.name || "",
        row.runs,
        row.employeeCount,
        money(row.gross),
        money(row.netPay),
        money(row.federalWithholding),
        money(row.employerFica + row.employerMedicare + row.futa + row.suta),
        money(row.federalLiability + row.stateLiability)
      ]);
      let headers = ["Client", "Runs", "Employees", "Gross Wages", "Net Pay", "Federal WH", "Employer Taxes", "Tax Liability"];
      let rows = baseSummaryRows;
      let note = "Generated from W-2 payroll pay runs for the selected period.";

      if (["payroll-register", "check-register", "pay-stub"].includes(reportType)) {
        headers = ["Pay Date", "Client", "Employee No.", "Employee", "Gross", "Employee Taxes", "Deductions", "Net Pay", "Status"];
        rows = rowsFromRunLines(runs, ({ run, clientRecord, employeeRecord, totals }) => [
          shortDate(run.payDate),
          clientRecord?.name || "",
          employeeRecord.employeeNo || "",
          employeeRecord.name || "",
          money(totals.gross),
          money(totals.employeeTaxes),
          money(totals.deductions),
          money(totals.netPay),
          run.status || ""
        ]);
      } else if (reportType === "cash-requirements") {
        headers = ["Client", "Net Pay", "Employee Tax Withholding", "Employer Taxes", "Deductions", "Total Cash Required"];
        rows = summaryRows.map(row => [
          row.client?.name || "",
          money(row.netPay),
          money(row.federalWithholding + row.stateWithholding + row.localTax + row.employeeFica + row.employeeMedicare + row.employeeAdditionalMedicare),
          money(row.employerFica + row.employerMedicare + row.futa + row.suta),
          money(row.workersComp),
          money(row.netPay + row.federalLiability + row.stateLiability)
        ]);
      } else if (reportType === "taxable-wages" || reportType === "wage-detail") {
        headers = ["Client", "Employee No.", "Employee", "Gross Wages", "Federal WH", "Employee SS", "Employee Medicare", "Employer Taxes", "Net Pay"];
        rows = wageRows.map(row => [
          row.client?.name || "",
          row.employee.employeeNo || "",
          row.employee.name || "",
          money(row.gross),
          money(row.federalWithholding),
          money(row.employeeSocialSecurity),
          money(row.employeeMedicare),
          money(row.employerSocialSecurity + row.employerMedicare + row.futa + row.suta),
          money(row.netPay)
        ]);
      } else if (reportType === "deductions") {
        headers = ["Client", "Employee No.", "Employee", "Gross Wages", "Deductions", "Net Pay"];
        rows = wageRows.map(row => [
          row.client?.name || "",
          row.employee.employeeNo || "",
          row.employee.name || "",
          money(row.gross),
          money(row.deductions),
          money(row.netPay)
        ]);
      } else if (["employee-earnings-record", "employee-detail", "new-hire", "time-off", "workers-compensation", "enrollment-details"].includes(reportType)) {
        headers = ["Client", "Employee No.", "Employee", "Status", "Pay Type", "Rate", "Gross Wages", "Net Pay"];
        rows = wageRows.map(row => [
          row.client?.name || "",
          row.employee.employeeNo || "",
          row.employee.name || "",
          row.employee.active ? "Active" : "Inactive",
          row.employee.payType || "",
          payTypeRate(row.employee),
          money(row.gross),
          money(row.netPay)
        ]);
      } else if (["940", "941", "state-unemployment", "state-withholding", "w2", "w3"].includes(reportType)) {
        headers = ["Client", "EIN", "Gross Wages", "Federal WH", "Employee SS", "Employee Medicare", "FUTA", "SUTA", "State WH", "Total Liability"];
        rows = summaryRows.map(row => [
          row.client?.name || "",
          row.client?.ein || "",
          money(row.gross),
          money(row.federalWithholding),
          money(row.employeeFica),
          money(row.employeeMedicare),
          money(row.futa),
          money(row.suta),
          money(row.stateWithholding + row.localTax),
          money(row.federalLiability + row.stateLiability)
        ]);
      } else if (reportType === "minimum-wage-alerts") {
        headers = ["Client", "Employee No.", "Employee", "Hourly Rate", "Status"];
        const runClientIds = new Set(runs.map(run => run.clientId));
        rows = data.employees
          .filter(item => runClientIds.size === 0 || runClientIds.has(item.clientId))
          .filter(item => item.payType === "Hourly")
          .map(item => {
            const clientRecord = client(item.clientId);
            const rate = num(item.hourlyRate);
            return [clientRecord?.name || "", item.employeeNo || "", item.name || "", money(rate), rate < 7.25 ? "Below federal minimum" : "OK"];
          });
        note = "Minimum wage alerts compare hourly rates to the federal minimum wage baseline stored in this offline app.";
      } else if (["invoice"].includes(reportType)) {
        headers = ["Client", "Invoice", "Customer", "Service", "Service Price", "Total Paid", "Remaining Balance", "Payment Status"];
        rows = serviceOrdersForReportContext().map(order => [
          client(order.clientId)?.name || "",
          order.orderNo || order.id,
          order.customerName || "",
          order.serviceName || "",
          money(orderServicePrice(order)),
          money(orderAmountPaid(order)),
          money(orderRemainingBalance(order)),
          orderPaymentStatus(order)
        ]);
        note = "Invoice report uses job/service order balances and payment status.";
      } else if (reportType === "completed-jobs-balance") {
        headers = ["Client", "Invoice", "Customer", "Service", "Completed Date", "Total Fee", "Total Paid", "Remaining Balance", "Status"];
        rows = serviceOrdersForReportContext()
          .filter(order => orderJobStatus(order) === "Completed With Balance")
          .map(order => [
            client(order.clientId)?.name || "",
            order.orderNo || order.id,
            order.customerName || "",
            order.serviceName || "",
            shortDate(order.completedAt || order.serviceDate),
            money(orderServicePrice(order)),
            money(orderAmountPaid(order)),
            money(orderRemainingBalance(order)),
            orderJobStatus(order)
          ]);
        note = `Total unpaid balance: ${money(serviceOrdersForReportContext().filter(order => orderJobStatus(order) === "Completed With Balance").reduce((sum, order) => sum + orderRemainingBalance(order), 0))}`;
      } else if (reportType === "customer-balances") {
        headers = ["Client", "Customer", "Open / Completed With Balance Jobs", "Total Service Fees", "Total Paid", "Total Unpaid Balance"];
        const grouped = new Map();
        serviceOrdersForReportContext().forEach(order => {
          const key = `${order.clientId}:${order.customerName || ""}`;
          if (!grouped.has(key)) grouped.set(key, { clientName: client(order.clientId)?.name || "", customer: order.customerName || "", jobs: 0, fees: 0, paid: 0, balance: 0 });
          const row = grouped.get(key);
          row.jobs += orderRemainingBalance(order) > 0 ? 1 : 0;
          row.fees += orderServicePrice(order);
          row.paid += orderAmountPaid(order);
          row.balance += orderRemainingBalance(order);
        });
        rows = [...grouped.values()].filter(row => row.balance > 0).map(row => [
          row.clientName,
          row.customer,
          row.jobs,
          money(row.fees),
          money(row.paid),
          money(row.balance)
        ]);
        note = `Total unpaid balance: ${money([...grouped.values()].reduce((sum, row) => sum + row.balance, 0))}`;
      } else if (reportType === "payment-history") {
        headers = ["Client", "Invoice", "Customer", "Payment Date", "Payment Method", "Amount", "Note"];
        rows = [];
        serviceOrdersForReportContext().forEach(order => {
          (order.payments || []).forEach(payment => {
            rows.push([
              client(order.clientId)?.name || "",
              order.orderNo || order.id,
              order.customerName || "",
              shortDate(payment.date),
              payment.method || "",
              money(payment.amount),
              payment.note || ""
            ]);
          });
        });
        note = "Payment history includes regular payments and completion collections.";
      }

      return { title: report.label, headers, rows, note, totals };
    }

    function renderGeneratedInvoiceReport() {
      const dataSet = generatedReportData("invoice", []);
      const orders = serviceOrdersForReportContext();
      const rowsHtml = orders.map(order => {
        const balance = orderRemainingBalance(order);
        const receiptIndex = latestPaymentIndex(order);
        return `
          <tr>
            <td><strong>${esc(client(order.clientId)?.name || "")}</strong><br><span class="muted">EIN ${esc(client(order.clientId)?.ein || "not entered")}</span></td>
            <td><strong>${esc(order.orderNo || order.id)}</strong><br><span class="muted">${shortDate(order.serviceDate)}</span></td>
            <td>${esc(order.customerName || "")}</td>
            <td>${esc(order.serviceName || "")}</td>
            <td class="right money">${money(orderServicePrice(order))}</td>
            <td class="right money">${money(orderAmountPaid(order))}</td>
            <td class="right money"><strong>${money(balance)}</strong></td>
            <td>${StatusBadge(orderPaymentStatus(order), orderStatusTone(order))}</td>
            <td class="right">
              <div class="actions" style="justify-content:flex-end">
                ${balance > 0
                  ? `<button class="btn secondary" type="button" onclick="openPaymentModal('${attr(order.id)}')">Balance Payment</button>`
                  : `<button class="btn secondary" type="button" disabled>Paid</button>`}
                ${receiptIndex >= 0 ? `<button class="btn ghost" type="button" onclick="printPaymentReceipt('${attr(order.id)}', ${receiptIndex})">Receipt</button>` : ""}
              </div>
            </td>
          </tr>
        `;
      }).join("");
      return `
        <section class="table-wrap" style="margin-top:16px">
          <div class="table-title">Generated ${esc(dataSet.title)} <span>${orders.length} rows</span></div>
          <div class="scroll">
            <table>
              <thead><tr><th>Client</th><th>Invoice</th><th>Customer</th><th>Service</th><th class="right">Service Price</th><th class="right">Total Paid</th><th class="right">Remaining Balance</th><th>Payment Status</th><th class="right">Actions</th></tr></thead>
              <tbody>${rowsHtml || `<tr><td colspan="9"><div class="empty">No invoices found for this report and period.</div></td></tr>`}</tbody>
            </table>
          </div>
          <div class="notice" style="border-width:1px 0 0;border-radius:0;padding:12px 16px">${esc(dataSet.note)} Use Balance Payment to collect money still owed, then print a receipt from the same invoice row.</div>
        </section>
      `;
    }

    function renderGeneratedPaymentHistoryReport() {
      const dataSet = generatedReportData("payment-history", []);
      const rows = [];
      serviceOrdersForReportContext().forEach(order => {
        (order.payments || []).forEach((payment, index) => {
          rows.push({ order, payment, index });
        });
      });
      const rowsHtml = rows.map(({ order, payment, index }) => `
        <tr>
          <td><strong>${esc(client(order.clientId)?.name || "")}</strong></td>
          <td>${esc(order.orderNo || order.id)}</td>
          <td>${esc(order.customerName || "")}</td>
          <td>${shortDate(payment.date)}</td>
          <td>${esc(payment.method || "")}</td>
          <td class="right money">${money(payment.amount)}</td>
          <td>${esc(payment.note || "")}</td>
          <td class="right"><button class="btn ghost" type="button" onclick="printPaymentReceipt('${attr(order.id)}', ${index})">Receipt</button></td>
        </tr>
      `).join("");
      return `
        <section class="table-wrap" style="margin-top:16px">
          <div class="table-title">Generated ${esc(dataSet.title)} <span>${rows.length} payments</span></div>
          <div class="scroll">
            <table>
              <thead><tr><th>Client</th><th>Invoice</th><th>Customer</th><th>Payment Date</th><th>Payment Method</th><th class="right">Amount</th><th>Note</th><th class="right">Actions</th></tr></thead>
              <tbody>${rowsHtml || `<tr><td colspan="8"><div class="empty">No payments found for this report and period.</div></td></tr>`}</tbody>
            </table>
          </div>
          <div class="notice" style="border-width:1px 0 0;border-radius:0;padding:12px 16px">${esc(dataSet.note)} Use Receipt to print proof of payment for the client/customer.</div>
        </section>
      `;
    }

    function renderGeneratedReport(reportType, runs) {
      if (reportType === "invoice") return renderGeneratedInvoiceReport();
      if (reportType === "payment-history") return renderGeneratedPaymentHistoryReport();
      const dataSet = generatedReportData(reportType, runs);
      const rowsHtml = dataSet.rows.map(row => `
        <tr>${row.map((cell, index) => `<td class="${index > 0 ? "right" : ""}">${esc(cell)}</td>`).join("")}</tr>
      `).join("");
      return `
        <section class="table-wrap" style="margin-top:16px">
          <div class="table-title">Generated ${esc(dataSet.title)} <span>${dataSet.rows.length} rows</span></div>
          <div class="scroll">
            <table>
              <thead><tr>${dataSet.headers.map((header, index) => `<th class="${index > 0 ? "right" : ""}">${esc(header)}</th>`).join("")}</tr></thead>
              <tbody>${rowsHtml || `<tr><td colspan="${dataSet.headers.length}"><div class="empty">No records found for this report and period.</div></td></tr>`}</tbody>
            </table>
          </div>
          <div class="notice" style="border-width:1px 0 0;border-radius:0;padding:12px 16px">${esc(dataSet.note)}</div>
        </section>
      `;
    }

              <tbody>${wagesHtml || `<tr><td colspan="6"><div class="empty">No wage rows in this report period.</div></td></tr>`}</tbody>
            </table>
          </div>
        </section>
      `;

    function saveServiceOrder(event, id) {
      event.preventDefault();
      const form = new FormData(event.target);
      const servicePrice = Math.max(0, num(form.get("servicePrice")));
      const amountPaid = Math.max(0, num(form.get("amountPaid")));
      if (amountPaid > servicePrice) {
        alert("Paid amount cannot exceed the total service price.");
        return;
      }
      const existing = id ? serviceOrder(id) : null;
      const payload = {
        ...(existing || {}),
        id: id || uid("j"),
        clientId: String(form.get("clientId") || ""),
        orderNo: String(form.get("orderNo") || "").trim(),
        customerName: String(form.get("customerName") || "").trim(),
        serviceName: String(form.get("serviceName") || "").trim(),
        serviceDate: String(form.get("serviceDate") || todayISO()),
        servicePrice,
        amountPaid,
        jobStatus: existing?.jobStatus || "Open",
        payments: Array.isArray(existing?.payments) ? existing.payments : (amountPaid > 0 ? [{ date: todayISO(), amount: amountPaid, method: "", note: "Initial payment" }] : []),
        completedAt: existing?.completedAt || "",
        completionPaymentMethod: existing?.completionPaymentMethod || "",
        completionNotes: existing?.completionNotes || "",
        notes: String(form.get("notes") || "").trim()
      };
      if (!payload.customerName || !payload.serviceName) return;
      data.serviceOrders = Array.isArray(data.serviceOrders) ? data.serviceOrders : [];
      if (id) {
        data.serviceOrders = data.serviceOrders.map(item => item.id === id ? payload : item);
      } else {
        data.serviceOrders.push(payload);
      }
      selectedClientId = payload.clientId;
      saveData();
      closeModal();
      render();
    }

    function saveServicePayment(event, id) {
      event.preventDefault();
      const order = serviceOrder(id);
      if (!order) return;
      const form = new FormData(event.target);
      const paymentAmount = Math.max(0, num(form.get("paymentAmount")));
      const currentBalance = orderRemainingBalance(order);
      if (paymentAmount <= 0) {
        alert("Enter a payment amount greater than $0.");
        return;
      }
      if (paymentAmount > currentBalance) {
        alert("Payment cannot exceed the remaining balance.");
        return;
      }
      const updatedPaid = orderAmountPaid(order) + paymentAmount;
      const newPaymentIndex = Array.isArray(order.payments) ? order.payments.length : 0;
      const shouldPrintReceipt = event.submitter?.name === "printReceipt" && event.submitter.value === "1";
      data.serviceOrders = (data.serviceOrders || []).map(item => item.id === id ? {
        ...item,
        amountPaid: Math.min(orderServicePrice(order), updatedPaid),
        payments: [
          ...(Array.isArray(item.payments) ? item.payments : []),
          { date: todayISO(), amount: paymentAmount, method: String(form.get("paymentMethod") || ""), note: String(form.get("paymentNote") || "").trim() }
        ]
      } : item);
      selectedClientId = order.clientId;
      saveData();
      closeModal();
      render();
      if (shouldPrintReceipt) printPaymentReceipt(id, newPaymentIndex);
    }

    function updateCompletionBalancePreview() {
      const orderId = document.getElementById("completionOrderId")?.value || "";
      const order = serviceOrder(orderId);
      if (!order) return;
      const collected = Math.max(0, num(document.getElementById("completionPaymentAmount")?.value));
      const totalFee = orderServicePrice(order);
      const paidBefore = orderAmountPaid(order);
      const paidAfter = Math.min(totalFee, paidBefore + collected);
      const remaining = Math.max(0, totalFee - paidAfter);
      const status = paidAfter <= 0 ? "Unpaid" : remaining <= 0 ? "Paid in Full" : "Partial Balance";
      const output = document.getElementById("completionBalancePreview");
      if (output) {
        output.innerHTML = `
          <div class="summary-strip" style="margin:0">
            <div><span>Total job fee</span><strong>${money(totalFee)}</strong></div>
            <div><span>Already paid</span><strong>${money(paidBefore)}</strong></div>
            <div><span>Remaining balance</span><strong>${money(remaining)}</strong></div>
            <div><span>Payment status</span><strong>${esc(status)}</strong></div>
          </div>
          ${remaining > 0 ? `<div class="notice" style="margin-top:10px;color:var(--red)"><strong>Balance Due.</strong> Job can be completed, but it will be marked Completed With Balance for follow-up.</div>` : ""}
          ${collected > orderRemainingBalance(order) ? `<div class="notice" style="margin-top:10px;color:var(--red)"><strong>Collected amount cannot exceed remaining balance.</strong></div>` : ""}
        `;
      }
    }

    function saveCompleteJob(event, id) {
      event.preventDefault();
      const order = serviceOrder(id);
      if (!order) return;
      const form = new FormData(event.target);
      const completionAmount = Math.max(0, num(form.get("completionAmount")));
      const balanceBefore = orderRemainingBalance(order);
      if (completionAmount > balanceBefore) {
        alert("Amount collected at completion cannot exceed the remaining balance.");
        return;
      }
      const method = String(form.get("completionMethod") || "");
      const notes = String(form.get("completionNotes") || "").trim();
      const paidAfter = Math.min(orderServicePrice(order), orderAmountPaid(order) + completionAmount);
      const newPaymentIndex = Array.isArray(order.payments) ? order.payments.length : 0;
      const shouldPrintReceipt = completionAmount > 0 && event.submitter?.name === "printReceipt" && event.submitter.value === "1";
      data.serviceOrders = (data.serviceOrders || []).map(item => item.id === id ? {
        ...item,
        jobStatus: "Completed",
        amountPaid: paidAfter,
        completedAt: todayISO(),
        completionPaymentMethod: method,
        completionNotes: notes,
        payments: completionAmount > 0
          ? [
              ...(Array.isArray(item.payments) ? item.payments : []),
              { date: todayISO(), amount: completionAmount, method, note: notes || "Collected at completion" }
            ]
          : (Array.isArray(item.payments) ? item.payments : [])
      } : item);
      selectedClientId = order.clientId;
      saveData();
      closeModal();
      render();
      if (shouldPrintReceipt) printPaymentReceipt(id, newPaymentIndex);
    }

    function savePayRun(event, id) {
      event.preventDefault();
      const run = data.payRuns.find(item => item.id === id);
      if (!run) return;
      const form = new FormData(event.target);
      const lineCount = num(form.get("lineCount"));
      const lines = [];
      for (let index = 0; index < lineCount; index += 1) {
        lines.push({
          employeeId: String(form.get(`employeeId_${index}`) || ""),
          regularHours: num(form.get(`regularHours_${index}`)),
          overtimeHours: num(form.get(`overtimeHours_${index}`)),
          bonus: num(form.get(`bonus_${index}`)),
          reimbursements: num(form.get(`reimbursements_${index}`)),
          deductions: num(form.get(`deductions_${index}`)),
          employeeTaxRate: String(form.get(`employeeTaxRate_${index}`) || "") === "" ? "" : num(form.get(`employeeTaxRate_${index}`)),
          notes: String(form.get(`notes_${index}`) || "")
        });
      }
      Object.assign(run, {
        clientId: String(form.get("clientId") || ""),
        periodStart: String(form.get("periodStart") || ""),
        periodEnd: String(form.get("periodEnd") || ""),
        payDate: String(form.get("payDate") || ""),
        status: String(form.get("status") || "Draft"),
        memo: String(form.get("memo") || ""),
        checkStartNumber: Math.max(1, num(form.get("checkStartNumber"))),
        lines
      });
      selectedClientId = run.clientId;
      saveData();
      closeModal();
      render();
    }

    function syncRunEmployees(id) {
      const run = data.payRuns.find(item => item.id === id);
      if (!run) return;
      const existing = new Set((run.lines || []).map(line => line.employeeId));
      const additions = employeesForClient(run.clientId, true)
        .filter(item => !existing.has(item.id))
        .map(item => ({
          employeeId: item.id,
          regularHours: item.payType === "Hourly" ? num(item.defaultHours) : 0,
          overtimeHours: 0,
          bonus: 0,
          reimbursements: 0,
          deductions: 0,
          employeeTaxRate: "",
          notes: ""
        }));
      run.lines = [...(run.lines || []), ...additions];
      saveData();
      openRunEditor(id);
    }

    function deletePayRun(id) {
      if (!confirm("Delete this pay run?")) return;
      data.payRuns = data.payRuns.filter(item => item.id !== id);
      saveData();
      closeModal();

          lineTotals.deductions.toFixed(2),
          lineTotals.reimbursements.toFixed(2),
          lineTotals.netPay.toFixed(2),
          lineTotals.employerFicaTax.toFixed(2),
          lineTotals.employerMedicareTax.toFixed(2),

          lineTotals.employerTaxes.toFixed(2),
          lineTotals.workersComp.toFixed(2),
          lineTotals.employerCost.toFixed(2),
          line.notes || ""
        ]);
      });
      return rows;

    function exportRunCsv(id) {
      const run = data.payRuns.find(item => item.id === id);
      if (!run) return;
      const name = (client(run.clientId)?.name || "client").replace(/[^a-z0-9]+/gi, "-").replace(/^-|-$/g, "").toLowerCase();
      const csv = runCsvRows(run).map(row => row.map(csvEscape).join(",")).join("\n");
      download(`payroll-${name}-${run.payDate || "run"}.csv`, csv, "text/csv");
    }

    function numberWords(value) {
      const ones = ["", "One", "Two", "Three", "Four", "Five", "Six", "Seven", "Eight", "Nine"];
      const teens = ["Ten", "Eleven", "Twelve", "Thirteen", "Fourteen", "Fifteen", "Sixteen", "Seventeen", "Eighteen", "Nineteen"];
      const tens = ["", "", "Twenty", "Thirty", "Forty", "Fifty", "Sixty", "Seventy", "Eighty", "Ninety"];
      function underThousand(n) {
        const parts = [];
        if (n >= 100) {
          parts.push(`${ones[Math.floor(n / 100)]} Hundred`);
          n %= 100;
        }
        if (n >= 20) {
          parts.push(tens[Math.floor(n / 10)]);
          if (n % 10) parts.push(ones[n % 10]);
        } else if (n >= 10) {
          parts.push(teens[n - 10]);
        } else if (n > 0) {
          parts.push(ones[n]);
        }
        return parts.join(" ");
      }
      let n = Math.floor(Math.abs(num(value)));
      if (n === 0) return "Zero";
      const groups = [
        [1000000000, "Billion"],
        [1000000, "Million"],
        [1000, "Thousand"]
      ];
      const parts = [];
      groups.forEach(([size, label]) => {
        if (n >= size) {
          parts.push(`${underThousand(Math.floor(n / size))} ${label}`);
          n %= size;
        }
      });
      if (n > 0) parts.push(underThousand(n));
      return parts.join(" ");
    }

    function moneyWords(value) {
      const amount = Math.max(0, num(value));
      const dollars = Math.floor(amount);
      const cents = Math.round((amount - dollars) * 100);
      return `${numberWords(dollars)} and ${String(cents).padStart(2, "0")}/100 Dollars`;
    }

      const reader = new FileReader();
      reader.onload = () => {
        try {
          const parsed = JSON.parse(String(reader.result || ""));
          const restored = normalizeData(parsed);
          if (!confirm("Replace the current offline payroll data with this backup?")) return;
          data = restored;
          selectedClientId = data.clients[0]?.id || "";
          saveData();
          closeModal();
          render();
        } catch (error) {
          alert("The selected file is not a valid payroll backup.");
        }
      };
      reader.readAsText(file);
      event.target.value = "";
    }
