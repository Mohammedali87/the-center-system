<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Center Business Services - Offline Payroll</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #101218;
      --muted: #667085;
      --line: #e7e9ee;
      --panel: #f7f8fb;
      --brand: #2563eb;
      --green: #16845b;
      --amber: #b56a04;
      --red: #c93737;
      --white: #ffffff;
      --teal: #0f766e;
      --violet: #6d28d9;
      --shadow: 0 18px 60px rgba(16, 18, 24, 0.08);
    }

    * { box-sizing: border-box; }

    html { min-width: 320px; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(245, 247, 250, 0.96)),
        #f5f7fa;
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    button:focus-visible,
    input:focus-visible,
    select:focus-visible,
    textarea:focus-visible {
      outline: 2px solid var(--brand);
      outline-offset: 2px;
    }

    .app {
      display: block;
      min-height: 100vh;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 20;
      display: grid;
      grid-template-columns: auto minmax(420px, 1fr) minmax(220px, 360px) auto;
      align-items: center;
      gap: 16px;
      border-bottom: 1px solid var(--line);
      background: var(--white);
      padding: 12px 22px;
      box-shadow: 0 1px 0 rgba(16, 18, 24, 0.03);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .app-logo {
      display: block;
      width: 148px;
      height: auto;
      flex: 0 0 auto;
      object-fit: contain;
    }

    .mark {
      display: grid;
      width: 42px;
      height: 42px;
      place-items: center;
      border-radius: 8px;
      background: var(--ink);
      color: var(--white);
      font-weight: 800;
      letter-spacing: 0;
      flex: 0 0 auto;
    }

    .brand strong,
    .brand span {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .brand strong { font-size: 14px; }
    .brand span { color: var(--muted); font-size: 12px; }

    .storage-pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      margin: 18px 0 14px;
      border: 1px solid #bde8d6;
      border-radius: 8px;
      background: #effaf5;
      color: var(--green);
      padding: 8px 10px;
      font-size: 12px;
      font-weight: 700;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: currentColor;
    }

    .nav {
      position: relative;
      display: flex;
      align-items: center;
      gap: 4px;
      min-width: 0;
      overflow-x: auto;
    }

    .nav button {
      display: flex;
      min-width: 0;
      height: 36px;
      align-items: center;
      gap: 7px;
      border-radius: 7px;
      background: transparent;
      color: var(--muted);
      padding: 0 10px;
      text-align: left;
      font-size: 13px;
      font-weight: 650;
      transition: background 0.16s ease, color 0.16s ease;
    }

    .nav button:hover {
      background: var(--panel);
      color: var(--ink);
    }

    .nav button.active {
      background: #eef4ff;
      color: var(--brand);
    }

    .nav svg {
      width: 17px;
      height: 17px;
      flex: 0 0 auto;
    }

    .nav span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .main {
      min-width: 0;
    }

    .top-search {
      position: relative;
      display: block;
      min-width: 0;
    }

    .top-search input {
      width: 100%;
      padding-left: 36px;
      border-color: #dce3ef;
      background: #fbfcff;
    }

    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      width: 14px;
      height: 14px;
      transform: translateY(-50%);
      border: 2px solid #98a2b3;
      border-radius: 999px;
      pointer-events: none;
    }

    .search-icon::after {
      content: "";
      position: absolute;
      right: -6px;
      bottom: -5px;
      width: 7px;
      height: 2px;
      border-radius: 999px;
      background: #98a2b3;
      transform: rotate(45deg);
    }

    .user-area {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 9px;
      min-width: 0;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .user-area strong {
      overflow: hidden;
      max-width: 150px;
      color: var(--ink);
      text-overflow: ellipsis;
    }

    .reports-menu {
      position: fixed;
      top: 66px;
      left: 220px;
      right: 24px;
      z-index: 25;
      display: none;
      max-width: 1100px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--white);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .reports-menu.open {
      display: block;
    }

    .reports-menu-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid var(--line);
      background: #fbfcff;
      padding: 14px 16px;
    }

    .reports-menu-head strong {
      display: block;
      color: var(--ink);
      font-size: 15px;
    }

    .reports-menu-head span {
      color: var(--muted);
      font-size: 12px;
    }

    .reports-menu-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(190px, 1fr));
      gap: 0;
      padding: 10px;
    }

    .reports-menu-section {
      min-width: 0;
      padding: 10px;
    }

    .reports-menu-section h3 {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .reports-menu-section a {
      display: block;
      border-radius: 7px;
      color: var(--ink);
      padding: 8px 9px;
      text-decoration: none;
      font-size: 13px;
      font-weight: 670;
    }

    .reports-menu-section a:hover {
      background: #eef4ff;
      color: var(--brand);
    }

    .topbar {
      position: relative;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.92);
      padding: 14px 24px;
      backdrop-filter: blur(12px);
    }

    .eyebrow {
      margin: 0 0 3px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 750;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .top-actions,
    .toolbar,
    .control-row,
    .actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .top-actions,
    .toolbar,
    .control-row {
      flex-wrap: wrap;
    }

    .content {
      padding: 22px 24px;
    }

    .grid {
      display: grid;
      gap: 14px;
    }

    .metrics {
      grid-template-columns: repeat(4, minmax(150px, 1fr));
      margin-bottom: 18px;
    }

    .two-col {
      grid-template-columns: minmax(0, 1.2fr) minmax(280px, 0.8fr);
    }

    .card,
    .table-wrap,
    .notice {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--white);
    }

    .card {
      padding: 16px;
    }

    .card .label {
      color: var(--muted);
      font-size: 13px;
    }

    .card .value {
      display: block;
      margin-top: 9px;
      color: var(--ink);
      font-size: clamp(22px, 3vw, 28px);
      font-weight: 760;
      letter-spacing: 0;
      line-height: 1.1;
    }

    .card .sub {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .notice {
      padding: 14px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .notice strong {
      color: var(--ink);
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      padding: 16px;
    }

    .info-item {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 10px;
    }

    .info-item span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      font-weight: 750;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .info-item strong {
      display: block;
      overflow-wrap: anywhere;
      margin-top: 5px;
      color: var(--ink);
      font-size: 14px;
      line-height: 1.35;
    }

    .table-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid var(--line);
      padding: 14px 16px;
      font-weight: 780;
    }

    .table-title span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }

    .scroll {
      overflow-x: auto;
    }

    table {
      width: 100%;
      min-width: 920px;
      border-collapse: collapse;
      font-size: 14px;
    }

    th {
      background: var(--panel);
      color: var(--muted);
      font-size: 11px;
      font-weight: 750;
      letter-spacing: 0.04em;
      padding: 12px 14px;
      text-align: left;
      text-transform: uppercase;
      white-space: nowrap;
    }

    td {
      border-top: 1px solid var(--line);
      color: var(--muted);
      padding: 12px 14px;
      vertical-align: middle;
    }

    td strong {
      color: var(--ink);
      font-weight: 730;
    }

    .right {
      text-align: right;
    }

    .muted {
      color: var(--muted);
    }

    .money {
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .btn,
    .icon-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 7px;
      font-size: 14px;
      font-weight: 720;
      transition: background 0.16s ease, border-color 0.16s ease, color 0.16s ease;
    }

    .btn {
      min-height: 38px;
      gap: 8px;
      background: var(--ink);
      color: var(--white);
      padding: 0 12px;
      white-space: nowrap;
    }

    .btn:hover {
      background: #000000;
    }

    .btn.secondary {
      border: 1px solid var(--line);
      background: var(--white);
      color: var(--ink);
    }

    .btn.secondary:hover,
    .icon-btn:hover {
      background: var(--panel);
    }

    .btn.ghost {
      background: transparent;
      color: var(--muted);
    }

    .btn.ghost:hover {
      background: var(--panel);
      color: var(--ink);
    }

    .btn.danger {
      background: var(--red);
      color: var(--white);
    }

    .btn.danger:hover {
      background: #a82020;
    }

    .icon-btn {
      width: 34px;
      height: 34px;
      border: 1px solid var(--line);
      background: var(--white);
      color: var(--muted);
      padding: 0;
    }

    .icon-btn svg,
    .btn svg {
      width: 16px;
      height: 16px;
      flex: 0 0 auto;
    }

    input,
    select,
    textarea {
      width: 100%;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--white);
      color: var(--ink);
      box-shadow: 0 1px 2px rgba(16, 18, 24, 0.04);
    }

    input,
    select {
      height: 39px;
      padding: 0 11px;
    }

    textarea {
      min-height: 90px;
      padding: 9px 11px;
      resize: vertical;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--ink);
      font-size: 13px;
      font-weight: 680;
    }

    label small {
      color: var(--muted);
      font-weight: 500;
      line-height: 1.35;
    }

    .field-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .field-row.three {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .field-row.four {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .full {
      grid-column: 1 / -1;
    }

    .form-grid {
      display: grid;
      gap: 14px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 24px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--panel);
      color: var(--muted);
      padding: 3px 8px;
      font-size: 12px;
      font-weight: 730;
      line-height: 1.2;
      white-space: nowrap;
    }

    .badge.green { border-color: #bde8d6; background: #effaf5; color: var(--green); }
    .badge.blue { border-color: #bdd2ff; background: #eef4ff; color: var(--brand); }
    .badge.amber { border-color: #f4d092; background: #fff7e8; color: var(--amber); }
    .badge.red { border-color: #f0b8b8; background: #fff0f0; color: var(--red); }
    .badge.teal { border-color: #99f6e4; background: #ecfdf5; color: var(--teal); }
    .badge.violet { border-color: #ddd6fe; background: #f5f3ff; color: var(--violet); }

    .breadcrumb {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 7px;
      margin-bottom: 14px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 640;
    }

    .breadcrumb a,
    .text-link {
      color: var(--brand);
      text-decoration: none;
      font-weight: 760;
    }

    .breadcrumb a:hover,
    .text-link:hover {
      text-decoration: underline;
    }

    .link-button,
    .sort-button {
      border: 0;
      background: transparent;
      color: var(--brand);
      padding: 0;
      text-align: left;
      font: inherit;
      font-weight: 760;
      cursor: pointer;
    }

    .sort-button {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 780;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .sort-button.active {
      color: var(--brand);
    }

    .company-link {
      color: var(--brand);
      text-decoration: none;
      font-weight: 780;
      cursor: pointer;
    }

    .company-link:hover {
      text-decoration: underline;
    }

    .client-due {
      box-shadow: inset 4px 0 0 #f4b740;
    }

    .client-overdue {
      box-shadow: inset 4px 0 0 var(--red);
    }

    .quick-action-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(150px, 1fr));
      gap: 10px;
    }

    .quick-action {
      display: flex;
      min-height: 74px;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--white);
      color: var(--ink);
      padding: 12px;
      text-align: left;
      font-weight: 760;
    }

    .quick-action span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      margin-top: 3px;
    }

    .quick-action:hover {
      border-color: #bdd2ff;
      background: #f8fbff;
      color: var(--brand);
    }

    .client-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 0 0 16px;
    }

    .client-tabs button {
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--white);
      color: var(--muted);
      padding: 0 11px;
      font-weight: 720;
    }

    .client-tabs button.active {
      border-color: #bdd2ff;
      background: #eef4ff;
      color: var(--brand);
    }

    .report-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(260px, 1fr));
      gap: 14px;
    }

    .reports-home-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(220px, 1fr));
      gap: 14px;
    }

    .report-page-head {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--white);
      padding: 16px;
      margin-bottom: 16px;
    }

    .report-page-head h2 {
      margin: 0;
      font-size: 22px;
      letter-spacing: 0;
    }

    .report-page-head p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .report-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--white);
      overflow: hidden;
    }

    .report-card h3 {
      margin: 0;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
      padding: 13px 14px;
      font-size: 14px;
      letter-spacing: 0;
    }

    .report-list {
      display: grid;
      gap: 8px;
      padding: 12px;
    }

    .report-list button {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--white);
      color: var(--ink);
      padding: 0 11px;
      text-align: left;
      font-weight: 680;
    }

    .report-list button:hover {
      border-color: #bdd2ff;
      background: #f8fbff;
      color: var(--brand);
    }

    .company-form-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--white);
      padding: 16px;
    }

    .workspace-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 18px;
    }

    .workspace-head h2 {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .workspace-head p {
      max-width: 780px;
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .client-summary-strip {
      display: grid;
      grid-template-columns: repeat(4, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .client-summary-strip .card {
      padding: 14px;
    }

    .client-summary-strip .value {
      font-size: 24px;
    }

    .filter-panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--white);
      padding: 14px 16px;
      margin-bottom: 16px;
    }

    .filter-panel .toolbar {
      justify-content: space-between;
    }

    .client-table table {
      min-width: 1080px;
    }

    .client-table tbody tr:hover {
      background: #fbfdff;
    }

    .client-primary {
      display: grid;
      gap: 4px;
    }

    .client-meta {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .row-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      flex-wrap: wrap;
      gap: 7px;
    }

    .row-actions .btn,
    .row-actions .badge {
      min-height: 30px;
      font-size: 12px;
    }

    .client-header-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--white);
      padding: 16px;
      margin-bottom: 16px;
    }

    .client-header-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 14px;
    }

    .client-header-top h2 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .client-header-top p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .client-command-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.25fr) minmax(310px, 0.75fr);
      gap: 16px;
      margin-bottom: 16px;
    }

    .client-command-metrics {
      display: grid;
      grid-template-columns: repeat(3, minmax(130px, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .client-command-metrics div {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 11px;
    }

    .client-command-metrics span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      font-weight: 760;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .client-command-metrics strong {
      display: block;
      margin-top: 5px;
      color: var(--ink);
      font-size: 18px;
      font-variant-numeric: tabular-nums;
    }

    .command-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--white);
      overflow: hidden;
    }

    .command-card h3 {
      margin: 0;
      border-bottom: 1px solid var(--line);
      background: #fbfcff;

        && !storedClients.some(item => item.name === "417 Vapor One Inc");

      const clients = sourceClients.map((item, index) => {
        const fallback = base.clients[index] || base.clients[0] || {};
        return {
          ...fallback,
          ...item,
          clientCode: item.clientCode ?? fallback.clientCode ?? "",
          legalName: item.legalName ?? item.name ?? fallback.legalName ?? "",

          stateFilingFrequency: item.stateFilingFrequency ?? "Quarterly",

          federalTaxSettings: item.federalTaxSettings ?? fallback.federalTaxSettings ?? "",

          tippedEmployeesEnabled: Boolean(item.tippedEmployeesEnabled ?? fallback.tippedEmployeesEnabled ?? false),

          active: item.active ?? true

      });
      const sourceEmployees = oldDemoData ? base.employees : (Array.isArray(value.employees) ? value.employees : base.employees);

        ...item,

      const sourceServiceOrders = oldDemoData ? base.serviceOrders : (Array.isArray(value.serviceOrders) ? value.serviceOrders : base.serviceOrders);
      const serviceOrders = sourceServiceOrders.map((item, index) => {
        const fallback = base.serviceOrders[index] || {};

          notes: item.notes ?? ""

      return {

    function uid(prefix) {
      return prefix + Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
    }

    function esc(value) {
      return String(value ?? "").replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function attr(value) {
      return esc(value).replace(/`/g, "&#096;");
    }

    function num(value) {
      const n = Number(value);
      return Number.isFinite(n) ? n : 0;
    }

    function pct(value) {
      const n = num(value);
      return `${n.toFixed(n % 1 === 0 ? 0 : 2)}%`;
    }

    function money(value) {
      return new Intl.NumberFormat("en-US", {
        style: "currency",
        currency: "USD",
        maximumFractionDigits: 2
      }).format(num(value));
    }

    function shortDate(value) {
      if (!value) return "Unscheduled";
      const date = new Date(`${value}T00:00:00`);
      if (Number.isNaN(date.getTime())) return value;
      return new Intl.DateTimeFormat("en-US", {
        month: "short",
        day: "numeric",
        year: "numeric"
      }).format(date);
    }

    function todayISO() {
      return new Date().toISOString().slice(0, 10);
    }

    function addDaysISO(days) {
      const date = new Date();
      date.setDate(date.getDate() + days);
      return date.toISOString().slice(0, 10);
    }

    function csvEscape(value) {
      const text = String(value ?? "");
      if (/[",\n]/.test(text)) return `"${text.replace(/"/g, '""')}"`;
      return text;
    }

    function download(filename, text, type = "text/plain") {
      const blob = new Blob([text], { type });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function orderServicePrice(order) {
      return Math.max(0, num(order?.servicePrice));
    }

    function orderAmountPaid(order) {
      return Math.min(orderServicePrice(order), Math.max(0, num(order?.amountPaid)));
    }

    function orderRemainingBalance(order) {
      return Math.max(0, orderServicePrice(order) - orderAmountPaid(order));
    }

    function orderPaymentStatus(order) {
      const price = orderServicePrice(order);
      const paid = orderAmountPaid(order);
      if (paid <= 0) return "Unpaid";
      if (price > 0 && paid >= price) return "Paid in Full";
      return "Partial Balance";
    }

    function orderStatusTone(order) {
      const status = orderPaymentStatus(order);
      if (status === "Paid in Full") return "green";
      if (status === "Partial Balance") return "amber";
      return "";
    }

    function orderJobStatus(order) {
      if (order?.jobStatus === "Completed" || order?.completedAt) {
        return orderRemainingBalance(order) > 0 ? "Completed With Balance" : "Completed";
      }
      return order?.jobStatus || "Open";
    }

    function orderJobStatusTone(order) {
      const status = orderJobStatus(order);
      if (status === "Completed") return "green";
      if (status === "Completed With Balance") return "red";
      return "blue";
    }

    function completedBalanceOrders(clientId = "") {
      return (data.serviceOrders || []).filter(order => {
        if (clientId && order.clientId !== clientId) return false;
        return orderJobStatus(order) === "Completed With Balance";
      });

    function latestPaymentIndex(order) {
      const payments = Array.isArray(order?.payments) ? order.payments : [];
      return payments.length - 1;

    function paymentReceiptNumber(order, payment, index) {

    }

    function taxYearConfigFor(payDate) {
      const fallback = defaultTaxYearConfigs()[0];
      const year = String(payDate || todayISO()).slice(0, 4);
      return (data.taxYears || []).find(item => String(item.year) === year) || (data.taxYears || [])[0] || fallback;
    }

    function filingStatusKey(value) {
      if (value === "married") return "married";
      if (value === "headOfHousehold") return "headOfHousehold";
      return "single";
    }

    function bracketTax(amount, brackets = []) {
      const taxable = Math.max(0, num(amount));
      const row = brackets.find(item => taxable >= num(item.over) && (item.max === null || item.max === undefined || taxable < num(item.max))) || brackets[brackets.length - 1];
      if (!row) return 0;
      return num(row.base) + Math.max(0, taxable - num(row.over)) * (num(row.rate) / 100);
    }

    function rateForLine(clientRecord, employeeRecord, line) {
      if (line.employeeTaxRate !== "" && line.employeeTaxRate !== null && line.employeeTaxRate !== undefined) {
        return num(line.employeeTaxRate);
      }
      if (employeeRecord?.employeeTaxRate !== "" && employeeRecord?.employeeTaxRate !== null && employeeRecord?.employeeTaxRate !== undefined) {
        return num(employeeRecord.employeeTaxRate);
      }
      return null;
    }

    function stateRateForLine(clientRecord, employeeRecord) {
      if (employeeRecord?.stateTaxRate !== "" && employeeRecord?.stateTaxRate !== null && employeeRecord?.stateTaxRate !== undefined) {
        return num(employeeRecord.stateTaxRate);
      }
      return num(clientRecord?.stateWithholdingRate);
    }

    function employerTaxRate(clientRecord) {
      const splitRate =
        num(clientRecord?.employerFicaRate) +
        num(clientRecord?.employerMedicareRate) +
        num(clientRecord?.futaRate) +
        num(clientRecord?.sutaRate);
      return splitRate > 0 ? splitRate : num(clientRecord?.employerTaxRate);
    }

    function grossForLine(clientRecord, employeeRecord, line) {
      if (!employeeRecord) return 0;
      const regularHours = num(line.regularHours);
      const overtimeHours = num(line.overtimeHours);
      const bonus = num(line.bonus);
      const baseGross = employeeRecord.payType === "Salary"
        ? salaryPerRun(clientRecord, employeeRecord)
        : num(employeeRecord.hourlyRate) * regularHours;
      const overtimeGross = employeeRecord.payType === "Hourly"
        ? num(employeeRecord.hourlyRate) * num(employeeRecord.overtimeMultiplier || 1.5) * overtimeHours
        : 0;
      return baseGross + overtimeGross + bonus;
    }

        federalIncome: 0,
        socialSecurity: 0,
        medicare: 0,
        futa: 0,
        suta: 0,
        stateIncome: 0,
        local: 0
      };
    }

    function taxableWagesFromGross(gross) {
      return {
        federalIncome: gross,
        socialSecurity: gross,
        medicare: gross,
        futa: gross,
        suta: gross,
        stateIncome: gross,
        local: gross
      };
    }

    function priorYtdTaxableWages(run, employeeId) {
      const totals = emptyYtdWages();
      if (!run || !employeeId) return totals;
      const year = String(run.payDate || "").slice(0, 4);
      data.payRuns.forEach(otherRun => {
        if (otherRun.id === run.id) return;
        if (String(otherRun.payDate || "").slice(0, 4) !== year) return;
        if (String(otherRun.payDate || "") >= String(run.payDate || "")) return;
        const otherClient = client(otherRun.clientId);
        (otherRun.lines || []).forEach(otherLine => {
          if (otherLine.employeeId !== employeeId) return;
          const otherEmployee = employee(otherLine.employeeId);
          const gross = grossForLine(otherClient, otherEmployee, otherLine);
          const taxable = taxableWagesFromGross(gross);
          Object.keys(totals).forEach(key => {
            totals[key] += taxable[key];
          });
        });
      });
      return totals;
    }

    function wageBaseTaxable(currentTaxable, ytdTaxable, wageBase) {
      if (!num(wageBase)) return currentTaxable;
      return Math.max(0, Math.min(currentTaxable, num(wageBase) - num(ytdTaxable)));
    }

    function federalIncomeTaxForLine(config, clientRecord, employeeRecord, line, federalTaxableWages) {
      if (employeeRecord?.w4Exempt) return 0;
      const manualRate = rateForLine(clientRecord, employeeRecord, line);
      if (manualRate !== null) return federalTaxableWages * (manualRate / 100);
      const periods = frequencies[clientRecord?.payFrequency] || 26;
      const status = filingStatusKey(employeeRecord?.w4FilingStatus);
      const federal = config.federalWithholding || {};
      const tableSet = employeeRecord?.w4Step2 ? federal.step2 : federal.standard;
      const brackets = tableSet?.[status] || federal.standard?.single || [];
      const standardDeduction = num(federal.standardDeduction?.[status]);
      const annualTaxable =
        federalTaxableWages * periods +
        num(employeeRecord?.w4OtherIncome) -
        num(employeeRecord?.w4Deductions) -
        standardDeduction;
      const annualTax = bracketTax(annualTaxable, brackets);
      const afterCredits = Math.max(0, annualTax - num(employeeRecord?.w4Dependents));
      return Math.max(0, afterCredits / periods + num(employeeRecord?.w4ExtraWithholding));
    }

    function ruleTax(rule, currentTaxable, ytdTaxable, periods) {
      if (!rule || rule.type === "none") return 0;
      if (rule.type === "wageBasePercent") {
        return wageBaseTaxable(currentTaxable, ytdTaxable, rule.wageBase) * (num(rule.rate) / 100);
      }
      if (rule.type === "annualizedBrackets") {
        const annualTaxable = currentTaxable * periods + num(rule.annualAdd) - num(rule.annualDeduction);
        return bracketTax(annualTaxable, rule.brackets || []) / periods;
      }
      return currentTaxable * (num(rule.rate) / 100);
    }

    function stateTaxForLine(config, clientRecord, employeeRecord, stateTaxableWages, ytdBefore) {
      const overrideRate = stateRateForLine(clientRecord, employeeRecord);
      if (overrideRate) return stateTaxableWages * (overrideRate / 100);
      const state = String(clientRecord?.state || "").toUpperCase();
      const rule = (config.stateRules || []).find(item => String(item.state || "").toUpperCase() === state);
      return ruleTax(rule, stateTaxableWages, ytdBefore.stateIncome, frequencies[clientRecord?.payFrequency] || 26);
    }

    function localTaxForLine(config, clientRecord, employeeRecord, localTaxableWages, ytdBefore) {
      const code = String(employeeRecord?.localTaxCode || clientRecord?.localTaxCode || "");
      if (!code) return 0;
      const rule = (config.localRules || []).find(item => String(item.code || item.name || "") === code);
      return ruleTax(rule, localTaxableWages, ytdBefore.local, frequencies[clientRecord?.payFrequency] || 26);
    }

    function salaryPerRun(clientRecord, employeeRecord) {
      const periods = frequencies[clientRecord?.payFrequency] || 26;
      return num(employeeRecord?.annualSalary) / periods;
    }

    function calculateLine(clientRecord, employeeRecord, line, run) {
      const taxConfig = taxYearConfigFor(run?.payDate);
      const blankYtd = emptyYtdWages();
      if (!employeeRecord) {
        return {
          grossWages: 0,
          gross: 0,
          employeeFederalIncomeTax: 0,
          employeeFederalTax: 0,
          employeeStateTax: 0,
          employeeLocalTax: 0,
          employeeSocialSecurity: 0,
          employeeFicaTax: 0,
          employeeMedicare: 0,
          employeeMedicareTax: 0,
          employeeAdditionalMedicare: 0,
          employeeTaxes: 0,
          totalEmployeeTaxes: 0,
          deductions: 0,
          reimbursements: num(line.reimbursements),
          netPay: 0,
          employerSocialSecurity: 0,
          employerFicaTax: 0,
          employerMedicare: 0,
          employerMedicareTax: 0,
          employerFUTA: 0,
          futaTax: 0,
          employerSUTA: 0,
          sutaTax: 0,
          employerTaxes: 0,
          totalEmployerPayrollTaxExpense: 0,
          workersComp: 0,
          employerCost: 0,
          totalEmployerCost: 0,
          currentTaxableWages: blankYtd,
          ytdTaxableWagesBefore: blankYtd,
          ytdTaxableWagesAfter: blankYtd
        };
      }

      const reimbursements = num(line.reimbursements);
      const extraDeductions = num(line.deductions);
      const gross = grossForLine(clientRecord, employeeRecord, line);
      const currentTaxableWages = taxableWagesFromGross(gross);
      const ytdBefore = priorYtdTaxableWages(run, employeeRecord.id);
      const ytdAfter = {};
      Object.keys(currentTaxableWages).forEach(key => {
        ytdAfter[key] = num(ytdBefore[key]) + num(currentTaxableWages[key]);
      });

      const socialSecurityTaxable = wageBaseTaxable(
        currentTaxableWages.socialSecurity,
        ytdBefore.socialSecurity,
        taxConfig.socialSecurityWageBase
      );
      const futaTaxable = wageBaseTaxable(currentTaxableWages.futa, ytdBefore.futa, taxConfig.futaWageBase);
      const sutaTaxable = wageBaseTaxable(currentTaxableWages.suta, ytdBefore.suta, taxConfig.sutaWageBase);
      const additionalMedicareTaxable = Math.max(
        0,
        ytdBefore.medicare + currentTaxableWages.medicare - num(taxConfig.additionalMedicareThreshold)
      ) - Math.max(0, ytdBefore.medicare - num(taxConfig.additionalMedicareThreshold));

      const employeeFederalTax = federalIncomeTaxForLine(taxConfig, clientRecord, employeeRecord, line, currentTaxableWages.federalIncome);
      const employeeStateTax = stateTaxForLine(taxConfig, clientRecord, employeeRecord, currentTaxableWages.stateIncome, ytdBefore);
      const employeeLocalTax = localTaxForLine(taxConfig, clientRecord, employeeRecord, currentTaxableWages.local, ytdBefore);
      const employeeFicaTax = socialSecurityTaxable * (num(taxConfig.socialSecurityRate) / 100);
      const employeeMedicareTax = currentTaxableWages.medicare * (num(taxConfig.medicareRate) / 100);
      const employeeAdditionalMedicare = additionalMedicareTaxable * (num(taxConfig.additionalMedicareRate) / 100);
      const employeeTaxes =
        employeeFederalTax +
        employeeStateTax +
        employeeLocalTax +
        employeeFicaTax +
        employeeMedicareTax +
        employeeAdditionalMedicare;
      const benefitDeductions = gross * (num(employeeRecord.benefitDeductionRate) / 100);
      const fixedDeductions = num(employeeRecord.fixedDeduction) + extraDeductions;
      const deductions = benefitDeductions + fixedDeductions;
      const netPay = Math.max(0, gross - employeeTaxes - deductions + reimbursements);
      const employerFicaTax = socialSecurityTaxable * (num(taxConfig.socialSecurityRate) / 100);
      const employerMedicareTax = currentTaxableWages.medicare * (num(taxConfig.medicareRate) / 100);
      const futaTax = futaTaxable * (num(taxConfig.futaRate) / 100);
      const sutaTax = sutaTaxable * (num(clientRecord?.sutaRate || taxConfig.defaultSutaRate) / 100);
      const employerTaxes = employerFicaTax + employerMedicareTax + futaTax + sutaTax;
      const workersComp = gross * (num(clientRecord?.workersCompRate) / 100);
      const employerCost = gross + employerTaxes + workersComp + reimbursements;

      return {
        grossWages: gross,
        gross,
        employeeFederalIncomeTax: employeeFederalTax,
        employeeFederalTax,
        employeeStateTax,
        employeeLocalTax,
        employeeSocialSecurity: employeeFicaTax,
        employeeFicaTax,
        employeeMedicare: employeeMedicareTax,
        employeeMedicareTax,
        employeeAdditionalMedicare,
        employeeTaxes,
        totalEmployeeTaxes: employeeTaxes,
        deductions,
        reimbursements,
        netPay,
        employerSocialSecurity: employerFicaTax,
        employerFicaTax,
        employerMedicare: employerMedicareTax,
        employerMedicareTax,
        employerFUTA: futaTax,
        futaTax,
        employerSUTA: sutaTax,
        sutaTax,
        employerTaxes,
        totalEmployerPayrollTaxExpense: employerTaxes,
        workersComp,
        employerCost,
        totalEmployerCost: employerCost,
        currentTaxableWages,
        ytdTaxableWagesBefore: ytdBefore,
        ytdTaxableWagesAfter: ytdAfter
      };
    }

    function calculateRun(run) {
      const clientRecord = client(run.clientId);
      const lines = (run.lines || []).map(line => {
        const employeeRecord = employee(line.employeeId);
        return { line, employee: employeeRecord, totals: calculateLine(clientRecord, employeeRecord, line, run) };
      });
      return lines.reduce((acc, item) => {
        acc.employees += item.employee ? 1 : 0;
        acc.gross += item.totals.gross;
        acc.employeeFederalTax += item.totals.employeeFederalTax;
        acc.employeeStateTax += item.totals.employeeStateTax;
        acc.employeeLocalTax += item.totals.employeeLocalTax;
        acc.employeeFicaTax += item.totals.employeeFicaTax;
        acc.employeeMedicareTax += item.totals.employeeMedicareTax;
        acc.employeeAdditionalMedicare += item.totals.employeeAdditionalMedicare;
        acc.employeeTaxes += item.totals.employeeTaxes;
        acc.deductions += item.totals.deductions;
        acc.reimbursements += item.totals.reimbursements;
        acc.netPay += item.totals.netPay;
        acc.employerFicaTax += item.totals.employerFicaTax;
        acc.employerMedicareTax += item.totals.employerMedicareTax;
        acc.futaTax += item.totals.futaTax;
        acc.sutaTax += item.totals.sutaTax;
        acc.employerTaxes += item.totals.employerTaxes;
        acc.workersComp += item.totals.workersComp;
        acc.totalEmployerPayrollTaxExpense += item.totals.totalEmployerPayrollTaxExpense;
        acc.employerCost += item.totals.employerCost;
        acc.lines.push(item);
        return acc;
      }, {
        employees: 0,
        gross: 0,
        employeeFederalTax: 0,
        employeeStateTax: 0,
        employeeLocalTax: 0,
        employeeFicaTax: 0,
        employeeMedicareTax: 0,
        employeeAdditionalMedicare: 0,
        employeeTaxes: 0,
        deductions: 0,
        reimbursements: 0,
        netPay: 0,
        employerFicaTax: 0,
        employerMedicareTax: 0,
        futaTax: 0,
        sutaTax: 0,
        employerTaxes: 0,
        workersComp: 0,
        totalEmployerPayrollTaxExpense: 0,
        employerCost: 0,
        lines: []
      });
    }

    function statusTone(status) {
      if (status === "Paid") return "green";
      if (status === "Ready") return "blue";
      return "amber";
    }

    function payTypeRate(item) {
      if (item.payType === "Salary") return `${money(item.annualSalary)} / yr`;
      return `${money(item.hourlyRate)} / hr`;
    }

    function displayFrequency(value) {
      if (value === "Bi-weekly") return "Bi-Weekly";
      if (value === "Semi-monthly") return "Semi-Monthly";
      return value || "Not set";
    }

    function routeFromPath(path) {
      const clean = String(path || "/dashboard").replace(/^#/, "") || "/dashboard";
      const parts = clean.split("?")[0].split("/").filter(Boolean);
      if (!parts.length || parts[0] === "dashboard") return { section: "dashboard", clientId: "", child: "" };
      if (parts[0] === "clients") return {
        section: parts[1] ? "client" : "clients",
        clientId: parts[1] || "",
        child: parts[2] || "",
        reportType: parts[2] === "reports" ? (parts[3] || "") : ""
      };
      if (parts[0] === "payroll") return { section: "runs", clientId: "", child: "" };
      if (parts[0] === "employees") return { section: "employees", clientId: "", child: "" };
      if (parts[0] === "reports") return { section: "reports", clientId: "", child: parts[1] || "", reportType: parts[1] || "" };
      if (parts[0] === "settings") return { section: "settings", clientId: "", child: "" };
      if (parts[0] === "hr-compliance") return { section: "compliance", clientId: "", child: "" };
      if (parts[0] === "resources") return { section: "resources", clientId: "", child: "" };
      if (parts[0] === "help") return { section: "help", clientId: "", child: "" };
      return { section: "dashboard", clientId: "", child: "" };
    }

    function currentRouteFromLocation() {
      return routeFromPath(location.hash ? location.hash.slice(1) : "/dashboard");
    }

    function tabForRoute(item = route) {
      if (item.section === "client") return "clients";
      return item.section;
    }

    function pathForTab(key) {
      return ({
        dashboard: "/dashboard",
        runs: "/payroll",
        reports: "/reports",
        employees: "/employees",
        clients: "/clients",
        compliance: "/hr-compliance",
        resources: "/resources",
        help: "/help",
        settings: "/settings"
      })[key] || "/dashboard";
    }

    function clientPath(clientId, child = "") {
      return `/clients/${encodeURIComponent(clientId)}${child ? `/${child}` : ""}`;
    }

    function reportPath(reportType = "", clientId = "") {
      if (clientId) return `/clients/${encodeURIComponent(clientId)}/reports${reportType ? `/${reportType}` : ""}`;
      return `/reports${reportType ? `/${reportType}` : ""}`;
    }

    function reportBySlug(slug = "") {
      return flatReports().find(item => item.slug === slug) || null;
    }

    function currentReportClientId() {
      return route.section === "client" && route.clientId ? route.clientId : "";
    }

    function navigateTo(path) {
      const next = `#${path}`;
      reportsMenuOpen = false;
      if (location.hash === next) {
        route = currentRouteFromLocation();
        tab = tabForRoute(route);
        render();
        return;
      }
      location.hash = next;
    }

    function handleRouteChange() {
      route = currentRouteFromLocation();
      tab = tabForRoute(route);
      if (route.clientId && client(route.clientId)) selectedClientId = route.clientId;
      render();
    }

    function handleGlobalSearch(value) {
      clientSearch = value;
      if (!["clients", "client", "dashboard"].includes(route.section)) {
        navigateTo("/clients");
        return;
      }
      render();
    }

    function daysUntilISO(value) {
      if (!value) return null;
      const target = new Date(`${value}T00:00:00`);
      const today = new Date(`${todayISO()}T00:00:00`);
      if (Number.isNaN(target.getTime())) return null;
      return Math.round((target - today) / 86400000);
    }

    function latestRunForClient(clientId) {
      return runsForClient(clientId)
        .slice()
        .sort((a, b) => String(b.payDate || "").localeCompare(String(a.payDate || "")))[0] || null;
    }

    function lastPaidDateForEmployee(employeeId) {
      const run = data.payRuns
        .filter(item => item.lines.some(line => line.employeeId === employeeId))
        .sort((a, b) => String(b.payDate || "").localeCompare(String(a.payDate || "")))[0];
      return run?.payDate || "";
    }

    function payrollStatus(clientRecord) {
      if (!clientRecord?.active) return { label: "Disabled", tone: "" };
      const days = daysUntilISO(clientRecord.nextPayDate);
      if (days !== null && days < 0) return { label: "Overdue", tone: "red" };
      if (days !== null && days <= 5) return { label: "Due Soon", tone: "amber" };
      const latest = latestRunForClient(clientRecord.id);
      if (latest?.status === "Paid") return { label: "Complete", tone: "green" };
      return { label: "Enabled", tone: "green" };
    }

    function StatusBadge(label, tone = "") {
      return `<span class="badge ${tone}">${esc(label)}</span>`;
    }

    function breadcrumb(clientRecord, childLabel = "") {
      return `
        <div class="breadcrumb">
          <a href="#/dashboard">Dashboard</a>
          <span>&gt;</span>
          <a href="#/clients">Clients</a>
          ${clientRecord ? `<span>&gt;</span><a href="#${clientPath(clientRecord.id)}">${esc(clientRecord.name)}</a>` : ""}
          ${childLabel ? `<span>&gt;</span><span>${esc(childLabel)}</span>` : ""}
        </div>
      `;
    }

    function reportsBreadcrumb(clientRecord = null, reportLabel = "") {
      if (clientRecord) {
        return `
          <div class="breadcrumb">
            <a href="#/dashboard">Dashboard</a>
            <span>&gt;</span>
            <a href="#/clients">Clients</a>
            <span>&gt;</span>
            <a href="#${clientPath(clientRecord.id)}">${esc(clientRecord.name)}</a>
            <span>&gt;</span>
            <a href="#${reportPath("", clientRecord.id)}">Reports</a>
            ${reportLabel ? `<span>&gt;</span><span>${esc(reportLabel)}</span>` : ""}
          </div>
        `;
      }
      return `
        <div class="breadcrumb">
          <a href="#/dashboard">Dashboard</a>
          <span>&gt;</span>
          <a href="#/reports">Reports</a>
          ${reportLabel ? `<span>&gt;</span><span>${esc(reportLabel)}</span>` : ""}
        </div>
      `;
    }

    function clientTabBar(clientRecord, child = "") {
      const tabsForClient = [
        ["", "Overview"],
        ["employees", "Employees"],
        ["reports", "Reports"],
        ["billing", "Billing"],
        ["company-info", "Company Info"]
      ];
      return `
        <div class="client-tabs" aria-label="Client sections">
          ${tabsForClient.map(([key, label]) => `
            <button type="button" class="${child === key ? "active" : ""}" onclick="navigateTo('${clientPath(clientRecord.id, key)}')">${esc(label)}</button>
          `).join("")}
        </div>
      `;
    }

    function renderNav() {
      document.getElementById("nav").innerHTML = tabs.map(([key, label]) => `
        <button type="button" class="${tab === key ? "active" : ""}" onclick="${key === "reports" ? "toggleReportsMenu()" : `setTab('${key}')`}">
          ${icons[key]}
          <span>${label}</span>
        </button>
      `).join("");
    }

    function renderReportsMenu() {
      const host = document.getElementById("reportsMenu");
      const clientId = currentReportClientId();
      const clientRecord = clientId ? client(clientId) : null;
      host.className = `reports-menu ${reportsMenuOpen ? "open" : ""}`;
      host.innerHTML = `
        <div class="reports-menu-head">
          <div>
            <strong>Reports</strong>
            <span>${clientRecord ? `Filtered to ${esc(clientRecord.name)}` : "Choose a W-2 payroll report"}</span>
          </div>
          <button class="btn secondary" type="button" onclick="closeReportsMenu()">Close</button>
        </div>
        <div class="reports-menu-grid">
          ${reportCatalog.map(section => `
            <section class="reports-menu-section">
              <h3>${esc(section.title)}</h3>
              ${section.reports.map(report => `
                <a href="#${reportPath(report.slug, clientId)}" onclick="closeReportsMenu()">${esc(report.label)}</a>
              `).join("")}
            </section>
          `).join("")}
        </div>
      `;
    }

    function toggleReportsMenu() {
      reportsMenuOpen = !reportsMenuOpen;
      renderReportsMenu();
    }

    function closeReportsMenu() {
      reportsMenuOpen = false;
      renderReportsMenu();
    }

    function renderClientPicker() {
      const picker = document.getElementById("clientPicker");
      picker.innerHTML = data.clients.map(item => `
        <option value="${attr(item.id)}" ${selectedClientId === item.id ? "selected" : ""}>${esc(item.name)}</option>
      `).join("");
      picker.disabled = data.clients.length === 0;
    }

    function render() {
      route = currentRouteFromLocation();
      tab = tabForRoute(route);
      if (!data.clients.some(item => item.id === selectedClientId)) {
        selectedClientId = data.clients[0]?.id || "";
      }
      if (route.clientId && !client(route.clientId)) {
        navigateTo("/clients");
        return;
      }
      renderNav();
      renderReportsMenu();
      renderClientPicker();
      const currentClient = route.clientId ? client(route.clientId) : client(selectedClientId);
      const meta = pageMeta(route, currentClient);
      document.getElementById("pageTitle").textContent = meta.title;
      document.getElementById("pageEyebrow").textContent = meta.eyebrow;
      document.getElementById("loggedInUser").textContent = data.settings.preparedBy || "Payroll desk";
      const globalSearch = document.getElementById("globalSearch");
      if (globalSearch && globalSearch.value !== clientSearch) globalSearch.value = clientSearch;
      document.getElementById("screen").innerHTML = renderRouteScreen();
    }

    function setTab(nextTab) {
      navigateTo(pathForTab(nextTab));
    }

    function pageMeta(item, currentClient) {
      if (item.section === "client") {
        const report = item.child === "reports" && item.reportType ? reportBySlug(item.reportType) : null;
        const childTitles = {
          employees: "Employees",
          reports: "Reports",
          billing: "Billing",
          "company-info": "Company Info"
        };
        return {
          title: report ? `${report.label} - ${currentClient?.name || "Client"}` : childTitles[item.child] ? `${childTitles[item.child]} - ${currentClient?.name || "Client"}` : currentClient?.name || "Client Dashboard",
          eyebrow: "Client Payroll"
        };
      }
      if (item.section === "reports" && item.reportType) {
        const report = reportBySlug(item.reportType);
        return { title: report?.label || "Report", eyebrow: "Payroll reports" };
      }
      return ({
        dashboard: { title: "Dashboard", eyebrow: "W-2 Payroll Workspace" },
        clients: { title: "Client Companies", eyebrow: "Dashboard > Clients" },
        runs: { title: "Payroll", eyebrow: "Run and manage W-2 payroll" },
        reports: { title: "Reports", eyebrow: "Payroll tax and wage reports" },
        employees: { title: "Employees", eyebrow: "W-2 employee records" },
        settings: { title: "Tax Settings", eyebrow: "Payroll configuration" },
        compliance: { title: "HR & Compliance", eyebrow: "W-2 payroll compliance" },
        resources: { title: "Resources", eyebrow: "Payroll references" },
        help: { title: "Help", eyebrow: "Support" }
      })[item.section] || { title: "Dashboard", eyebrow: "W-2 Payroll Workspace" };
    }

    function renderRouteScreen() {
      if (route.section === "client") return ClientDashboard(route.clientId, route.child || "");
      if (route.section === "clients") return renderClients();
      if (route.section === "runs") return renderRuns();
      if (route.section === "reports") return route.reportType ? renderReportPage(route.reportType) : renderReports();
      if (route.section === "employees") return renderEmployees();
      if (route.section === "settings") return renderSettings();
      if (route.section === "compliance") return renderUtilityPage("HR & Compliance", [
        "W-2 employee setup checklist",

        "Quarterly payroll tax review",
        "Workers' compensation class review"
      ]);
      if (route.section === "resources") return renderUtilityPage("Resources", [
        "Payroll calendar",
        "Federal deposit schedule notes",
        "State agency account checklist",
        "Year-end W-2 preparation"
      ]);
      if (route.section === "help") return renderUtilityPage("Help", [
        "Client setup guide",
        "Pay run checklist",
        "Report export guide",
        "Backup and restore"
      ]);
      return renderDashboard();

    function clientAccountPanel(clientRecord) {
      if (!clientRecord) {
        return `<div class="empty">Select or add a client to see account information.</div>`;
      }
      return `
        <section class="table-wrap">
          <div class="table-title">

    function renderDashboard() {
      const now = new Date();
      const month = now.toISOString().slice(0, 7);
      const monthlyRuns = data.payRuns.filter(run => String(run.payDate || "").slice(0, 7) === month);
      const monthly = monthlyRuns.reduce((acc, run) => {
        const totals = calculateRun(run);
        acc.gross += totals.gross;
        acc.net += totals.netPay;
        acc.cost += totals.employerCost;
        return acc;
      }, { gross: 0, net: 0, cost: 0 });
      const draftRuns = data.payRuns.filter(run => run.status !== "Paid");
      const activeEmployees = data.employees.filter(item => item.active).length;
      const dueSoon = data.clients.filter(item => ["Due Soon", "Overdue"].includes(payrollStatus(item).label)).length;

      return `
        <div class="workspace-head">
          <div>
            <h2>Client Payroll Work Queue</h2>
            <p>Open a company to manage W-2 payroll, employees, reports, tax setup, notes, and documents from one client workspace.</p>
          </div>
          <div class="actions">
            <button class="btn secondary" type="button" onclick="exportBackup()">Backup</button>
            <button class="btn" type="button" onclick="openClientModal()">Add client</button>
          </div>
        </div>
        <div class="client-summary-strip">
          ${metricCard("Month gross", money(monthly.gross), "All clients")}
          ${metricCard("Month net pay", money(monthly.net), "Checks and direct deposit")}
          ${metricCard("Employer cost", money(monthly.cost), "Gross, employer rates, reimbursements")}
          ${metricCard("Due payrolls", dueSoon, `${draftRuns.length} open runs, ${activeEmployees} active employees`)}
        </div>

        ${SearchAndFilters()}
        ${ClientAccountsTable(filteredClients())}
      `;

    function SearchAndFilters() {
      return `
        <section class="filter-panel">
          <div class="toolbar">
          <div class="control-row">
            <input class="mini" type="search" placeholder="Search company name" value="${attr(clientSearch)}" oninput="clientSearch=this.value;render()">
            <select class="mini" onchange="clientFrequencyFilter=this.value;render()">
              <option value="All" ${clientFrequencyFilter === "All" ? "selected" : ""}>All frequencies</option>
              ${Object.keys(frequencies).map(freq => `<option value="${attr(freq)}" ${clientFrequencyFilter === freq ? "selected" : ""}>${esc(displayFrequency(freq))}</option>`).join("")}
            </select>
            <select class="mini" onchange="clientStatusFilter=this.value;render()">
              ${["All", "Enabled", "Disabled"].map(status => `<option value="${status}" ${clientStatusFilter === status ? "selected" : ""}>${status} status</option>`).join("")}
            </select>
          </div>
          <button class="btn secondary" type="button" onclick="clearClientFilters()">Clear filters</button>
          </div>
        </section>
      `;
    }

    function clearClientFilters() {
      clientSearch = "";
      clientFrequencyFilter = "All";
      clientStatusFilter = "All";
      clientSortKey = "name";
      clientSortDirection = "asc";
      render();
    }

    function filteredClients() {
      const search = clientSearch.trim().toLowerCase();
      const frequencyOrder = { Weekly: 1, "Bi-weekly": 2, "Semi-monthly": 3, Monthly: 4 };
      let list = data.clients.slice();
      if (search) {
        list = list.filter(item => `${item.name} ${item.clientCode} ${item.legalName} ${item.contact}`.toLowerCase().includes(search));
      }
      if (clientFrequencyFilter !== "All") list = list.filter(item => item.payFrequency === clientFrequencyFilter);
      if (clientStatusFilter === "Enabled") list = list.filter(item => item.active);
      if (clientStatusFilter === "Disabled") list = list.filter(item => !item.active);
      list.sort((a, b) => {
        const direction = clientSortDirection === "desc" ? -1 : 1;
        let left = "";
        let right = "";
        if (clientSortKey === "lastRunDate") {
          left = latestRunForClient(a.id)?.payDate || "";
          right = latestRunForClient(b.id)?.payDate || "";
        } else if (clientSortKey === "nextPayDate") {
          left = a.nextPayDate || "";
          right = b.nextPayDate || "";
        } else if (clientSortKey === "frequency") {
          left = frequencyOrder[a.payFrequency] || 99;
          right = frequencyOrder[b.payFrequency] || 99;
          return (left - right) * direction;
        } else {
          left = a.name || "";
          right = b.name || "";
        }
        return String(left).localeCompare(String(right)) * direction;
      });
      return list;
    }

    function setClientSort(key) {
      if (clientSortKey === key) {
        clientSortDirection = clientSortDirection === "asc" ? "desc" : "asc";
      } else {
        clientSortKey = key;

      }
      render();
    }

    function quarterFor(value) {
      const date = new Date(`${value}T00:00:00`);
      if (Number.isNaN(date.getTime())) return "";
      return `Q${Math.floor(date.getMonth() / 3) + 1}`;
    }

    function reportYears() {
      const years = new Set([String(new Date().getFullYear())]);
      data.payRuns.forEach(run => {
        if (run.payDate) years.add(String(run.payDate).slice(0, 4));
      });
      return [...years].sort((a, b) => b.localeCompare(a));
    }

    function reportPeriodLabel() {
      return `${reportQuarterFilter === "All" ? "Full year" : reportQuarterFilter} ${reportYearFilter}`;
    }

    function filteredReportRuns() {
      return data.payRuns.filter(run => {
        if (reportClientFilter !== "All" && run.clientId !== reportClientFilter) return false;
        if (reportYearFilter && String(run.payDate || "").slice(0, 4) !== reportYearFilter) return false;
        if (reportQuarterFilter !== "All" && quarterFor(run.payDate) !== reportQuarterFilter) return false;
        return true;
      });
    }

    function taxSummaryRows(runs) {
      const rows = new Map();
      runs.forEach(run => {
        const clientRecord = client(run.clientId);
        const key = run.clientId;
        if (!rows.has(key)) {
          rows.set(key, {
            client: clientRecord,
            runs: 0,
            employees: new Set(),
            gross: 0,
            netPay: 0,
            federalWithholding: 0,
            employeeFica: 0,
            employeeMedicare: 0,
            employeeAdditionalMedicare: 0,
            employerFica: 0,
            employerMedicare: 0,
            futa: 0,
            stateWithholding: 0,
            localTax: 0,
            suta: 0,
            workersComp: 0
          });
        }
        const row = rows.get(key);
        row.runs += 1;
        calculateRun(run).lines.forEach(({ line, employee: employeeRecord, totals }) => {
          if (employeeRecord) row.employees.add(employeeRecord.id);
          row.gross += totals.gross;
          row.netPay += totals.netPay;
          row.federalWithholding += totals.employeeFederalTax;
          row.employeeFica += totals.employeeFicaTax;
          row.employeeMedicare += totals.employeeMedicareTax;
          row.employeeAdditionalMedicare += totals.employeeAdditionalMedicare;
          row.employerFica += totals.employerFicaTax;
          row.employerMedicare += totals.employerMedicareTax;
          row.futa += totals.futaTax;
          row.stateWithholding += totals.employeeStateTax;
          row.localTax += totals.employeeLocalTax;
          row.suta += totals.sutaTax;
          row.workersComp += totals.workersComp;
        });
      });
      return [...rows.values()].map(row => ({
        ...row,
        employeeCount: row.employees.size,
        federalLiability:
          row.federalWithholding +
          row.employeeFica +
          row.employeeMedicare +
          row.employeeAdditionalMedicare +
          row.employerFica +
          row.employerMedicare +
          row.futa,
        stateLiability: row.stateWithholding + row.localTax + row.suta
      }));
    }

    function wageReportRows(runs) {
      const rows = new Map();
      runs.forEach(run => {
        const clientRecord = client(run.clientId);
        calculateRun(run).lines.forEach(({ employee: employeeRecord, totals }) => {
          if (!employeeRecord) return;
          const key = `${run.clientId}:${employeeRecord.id}`;
          if (!rows.has(key)) {
            rows.set(key, {
              client: clientRecord,
              employee: employeeRecord,
              gross: 0,
          federalWithholding: 0,
              stateWithholding: 0,
              localTax: 0,
              employeeSocialSecurity: 0,
              employeeMedicare: 0,
              employeeAdditionalMedicare: 0,
              employerSocialSecurity: 0,
          employerMedicare: 0,
          futa: 0,
          suta: 0,
          workersComp: 0,
          deductions: 0,
          netPay: 0
        });
      }
      const row = rows.get(key);
      row.gross += totals.gross;
          row.federalWithholding += totals.employeeFederalTax;
          row.stateWithholding += totals.employeeStateTax;
          row.localTax += totals.employeeLocalTax;
          row.employeeSocialSecurity += totals.employeeFicaTax;
          row.employeeMedicare += totals.employeeMedicareTax;
          row.employeeAdditionalMedicare += totals.employeeAdditionalMedicare;
      row.employerSocialSecurity += totals.employerFicaTax;
      row.employerMedicare += totals.employerMedicareTax;
      row.futa += totals.futaTax;
      row.suta += totals.sutaTax;
      row.workersComp += totals.workersComp;
      row.deductions += totals.deductions;
      row.netPay += totals.netPay;
    });
      });
      return [...rows.values()].sort((a, b) => `${a.client?.name} ${a.employee.name}`.localeCompare(`${b.client?.name} ${b.employee.name}`));
    }

      return `
